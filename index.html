<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Content Generator</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:white;border-radius:15px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-width:700px;width:100%;padding:40px}
h1{color:#667eea;text-align:center;margin-bottom:30px}
.form-group{margin-bottom:20px}
label{display:block;margin-bottom:8px;color:#333;font-weight:bold}
textarea,select,input{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:1em;font-family:Arial}
textarea:focus,select:focus,input:focus{outline:none;border-color:#667eea}
textarea{min-height:100px}
button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;font-size:1em;font-weight:bold;cursor:pointer;margin-top:10px}
button:hover{opacity:0.9}
button:disabled{opacity:0.6;cursor:not-allowed}
#result{margin-top:30px;padding:20px;background:#f8f9fa;border-radius:8px;min-height:100px;display:none}
.loading{text-align:center;color:#667eea;display:none}
.error{color:red;padding:10px;background:#ffe0e0;border-radius:5px;display:none;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<h1>✨ AI Content Generator</h1>
<div id="error" class="error"></div>
<div class="form-group">
<label>What to write about?</label>
<textarea id="prompt" placeholder="Example: Write a blog post about AI..."></textarea>
</div>
<div class="form-group">
<label>Type</label>
<select id="type">
<option value="blog">Blog Post</option>
<option value="email">Email</option>
<option value="social">Social Media</option>
<option value="product">Product Description</option>
</select>
</div>
<div class="form-group">
<label>Tone</label>
<select id="tone">
<option value="professional">Professional</option>
<option value="casual">Casual</option>
<option value="funny">Funny</option>
</select>
</div>
<button onclick="generate()">Generate Content</button>
<div class="loading">
<p>⏳ Generating... (5-10 seconds)</p>
</div>
<div id="result">
<h3>Your Content:</h3>
<div id="content"></div>
<button onclick="copy()" style="margin-top:10px;">📋 Copy</button>
</div>
</div>
<script>
const BACKEND = 'https://ai-content-generator-production-a3e06c2d.railway.app';
async function generate() {
  const prompt = document.getElementById('prompt').value;
  if (!prompt) {
    showError('Please enter a prompt');
    return;
  }
  const type = document.getElementById('type').value;
  const tone = document.getElementById('tone').value;
  document.querySelector('.loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  hideError();
  try {
    const response = await fetch(BACKEND + '/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt, type, tone})
    });
    const data = await response.json();
    if (data.error) {
      showError(data.error);
    } else {
      document.getElementById('content').innerText = data.content;
      document.getElementById('result').style.display = 'block';
    }
  } catch(e) {
    showError('Connection error: ' + e.message);
  }
  document.querySelector('.loading').style.display = 'none';
}
function copy() {
  const text = document.getElementById('content').innerText;
  navigator.clipboard.writeText(text);
  alert('Copied!');
}
function showError(msg) {
  document.getElementById('error').innerText = msg;
  document.getElementById('error').style.display = 'block';
}
function hideError() {
  document.getElementById('error').style.display = 'none';
}
</script>
</body>
</html>
